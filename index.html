  /* Voile dégradé pour la lisibilité + ambiance chaude */
  .veil {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(60,44,24,0.25) 0%, rgba(20,15,10,0.78) 55%, rgba(15,11,7,0.95) 100%),
      linear-gradient(180deg, rgba(20,15,10,0.35) 0%, rgba(15,11,7,0.55) 100%);
  }

  .wrap { width: 100%; max-width: 560px; position: relative; }
  header { text-align: center; margin-bottom: 24px; }
  h1 {
    font-family: var(--serif);
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--ink);
    text-shadow: 0 2px 18px rgba(0,0,0,0.6);
  }
  h1 .accent {
    color: var(--amber);
    font-style: italic;
  }
  .subtitle {
    color: var(--muted); font-size: 0.92rem; margin-top: 6px;
    font-family: var(--serif); font-style: italic; letter-spacing: 0.02em;
  }

  .card {
    background: var(--glass);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px) saturate(1.1);
    -webkit-backdrop-filter: blur(10px) saturate(1.1);
    box-shadow: 0 10px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .settings { display: flex; flex-direction: column; gap: 16px; }
  .setting-row { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .seg {
    display: flex;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 11px;
    padding: 4px;
    gap: 4px;
  }
  .seg button {
    flex: 1; border: none; background: transparent; color: var(--muted);
    padding: 10px 6px; border-radius: 8px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: var(--sans);
    transition: background .18s, color .18s, box-shadow .18s;
  }
  .seg button.active {
    background: linear-gradient(160deg, var(--amber), var(--amber-deep));
    color: #241a0c;
    box-shadow: 0 3px 12px rgba(232,176,77,0.3);
  }

  .stage { text-align: center; }
  .scoreline { display: flex; justify-content: space-around; margin-bottom: 22px; gap: 10px; }
  .stat { flex: 1; }
  .stat .num { font-family: var(--serif); font-size: 1.7rem; font-weight: 700; color: var(--amber); }
  .stat .cap { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  .play-btn {
    width: 104px; height: 104px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 38% 32%, #f6c869, var(--amber) 45%, var(--amber-deep));
    color: #241a0c; font-size: 2.3rem;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(232,176,77,.32), inset 0 2px 4px rgba(255,255,255,0.4);
    transition: transform .1s; margin-bottom: 8px;
  }
  .play-btn:active { transform: scale(0.93); }
  .play-btn.playing { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 10px 30px rgba(232,176,77,.32), inset 0 2px 4px rgba(255,255,255,0.4); }
    50% { box-shadow: 0 10px 48px rgba(232,176,77,.7), inset 0 2px 4px rgba(255,255,255,0.4); }
  }
  .replay {
    display: block; margin: 0 auto 18px; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 0.85rem; font-family: var(--sans);
    text-decoration: underline; text-underline-offset: 3px;
  }
  .replay:hover { color: var(--ink); }

  .prompt {
    font-family: var(--serif); font-size: 1.05rem; color: var(--ink);
    min-height: 1.4em; margin-bottom: 16px;
  }

  .choices { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .choices.intervals { grid-template-columns: repeat(3, 1fr); }
  .choice {
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--glass-2);
    color: var(--ink);
    padding: 14px 4px; border-radius: 11px;
    font-size: 0.98rem; font-weight: 600; cursor: pointer; font-family: var(--sans);
    transition: background .12s, border-color .12s, transform .08s;
  }
  .choice:hover:not(:disabled) { border-color: var(--amber-deep); background: rgba(72,57,36,0.7); }
  .choice:active:not(:disabled) { transform: scale(0.96); }
  .choice:disabled { cursor: default; }
  .choice.correct { background: var(--green); border-color: var(--green); color: #0f2410; }
  .choice.wrong { background: var(--red); border-color: var(--red); color: #2a0d07; }
  .choice.reveal { border-color: var(--green); color: var(--green); }

  /* ---- Manche du violon ---- */
  .fingerboard {
    position: relative;
    width: 100%;
    max-width: 280px;
    height: 380px;
    margin: 28px auto 6px;
    border-radius: 10px 10px 12px 12px;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.45), rgba(0,0,0,0) 16%, rgba(0,0,0,0) 84%, rgba(0,0,0,0.45)),
      linear-gradient(180deg, #43301c, #2a1c10);
    box-shadow: inset 0 0 34px rgba(0,0,0,0.6), 0 10px 30px rgba(0,0,0,0.45);
    border: 1px solid rgba(0,0,0,0.55);
  }
  .fb-nut {
    position: absolute; left: 4%; right: 4%; top: 5.6%; height: 5px;
    background: linear-gradient(#f2e6cc, #cbb48c);
    border-radius: 2px; box-shadow: 0 1px 3px rgba(0,0,0,.5);
  }
  .fb-string {
    position: absolute; top: 4%; bottom: 2%;
    transform: translateX(-50%);
    background: linear-gradient(90deg, rgba(255,255,255,.25), rgba(255,255,255,.9), rgba(255,255,255,.25));
    box-shadow: 0 0 3px rgba(0,0,0,.4);
  }
  .fb-label {
    position: absolute; top: -24px; transform: translateX(-50%);
    font-family: var(--serif); font-size: .82rem; color: var(--muted);
  }
  .fb-dot {
    position: absolute; width: 30px; height: 30px;
    transform: translate(-50%, -50%);
    border-radius: 50%; border: 1px solid rgba(255,255,255,.14);
    background: rgba(18,12,7,.45); color: transparent;
    font-size: .68rem; font-weight: 700; font-family: var(--sans);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s, transform .08s, color .12s;
  }
  .fb-dot.open { background: rgba(232,176,77,.16); border-color: rgba(232,176,77,.45); }
  .fb-dot:hover:not(:disabled) { background: rgba(232,176,77,.4); }
  .fb-dot:active:not(:disabled) { transform: translate(-50%,-50%) scale(.88); }
  .fb-dot:disabled { opacity: .2; cursor: default; }
  .fb-dot.show-name { color: var(--ink); }
  .fb-dot.correct { background: var(--green); border-color: var(--green); color: #0f2410; }
  .fb-dot.wrong { background: var(--red); border-color: var(--red); color: #2a0d07; }
  .fb-dot.reveal { background: rgba(123,207,131,.22); border-color: var(--green); color: var(--green); }
  .fb-help {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    color: var(--muted); font-size: .8rem; margin-bottom: 6px; cursor: pointer;
  }
  .fb-help input { accent-color: var(--amber); }

  /* ---- Mode Gammes ---- */
  #scaleControls { margin-bottom: 2px; }
  .tonic-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 12px; }
  .tonic {
    border: 1px solid rgba(255,255,255,.08); background: var(--glass-2); color: var(--ink);
    padding: 10px 2px; border-radius: 9px; font-size: .85rem; font-weight: 600; font-family: var(--sans);
    cursor: pointer; transition: background .12s, border-color .12s, transform .08s;
  }
  .tonic:hover { border-color: var(--amber-deep); background: rgba(72,57,36,.7); }
  .tonic:active { transform: scale(.95); }
  .tonic.active {
    background: linear-gradient(160deg, var(--amber), var(--amber-deep));
    color: #241a0c; border-color: var(--amber);
  }
  .fb-dot.scale-dim { opacity: .14; }
  .fb-dot.scale-note {
    background: rgba(232,176,77,.9); border-color: var(--amber); color: #241a0c; opacity: 1;
  }
  .fb-dot.scale-root { box-shadow: 0 0 0 2px #fff, 0 0 10px rgba(232,176,77,.6); }
  .fb-dot.scale-note.playing {
    background: var(--green); border-color: var(--green); color: #0f2410;
    transform: translate(-50%,-50%) scale(1.3);
    box-shadow: 0 0 16px rgba(123,207,131,.85); z-index: 2;
  }

  .feedback { min-height: 2.4em; margin-top: 18px; font-size: 1.05rem; font-weight: 600; font-family: var(--serif); }
  .feedback.good { color: var(--green); }
  .feedback.bad { color: var(--red); }
  .next-btn {
    margin-top: 14px; border: none; cursor: pointer;
    background: linear-gradient(160deg, var(--amber), var(--amber-deep)); color: #241a0c; font-weight: 700;
    padding: 13px 30px; border-radius: 11px; font-size: 0.95rem; font-family: var(--sans);
    box-shadow: 0 4px 16px rgba(232,176,77,0.3);
  }
  .hidden { display: none !important; }
  footer { color: var(--muted); font-size: 0.74rem; text-align: center; margin-top: 8px; }
  .credit { color: rgba(182,168,140,0.55); font-size: 0.68rem; text-align: center; margin-top: 4px; font-style: italic; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="veil"></div>
<div class="wrap">
  <header>
    <h1>Violon <span class="accent">à l'oreille</span></h1>
    <div class="subtitle">Écoute, reconnais, progresse — à l'école de Paganini</div>
  </header>

  <div class="card">
    <div class="settings">
      <div class="setting-row">
        <span class="label">Mode</span>
        <div class="seg" id="modeSeg">
          <button data-mode="fingerboard" class="active">Manche</button>
          <button data-mode="absolute">Nommer</button>
          <button data-mode="interval">Intervalle</button>
          <button data-mode="scales">Gammes</button>
        </div>
      </div>
      <div class="setting-row" id="rangeSetting">
        <span class="label">Étendue des notes</span>
        <div class="seg" id="rangeSeg">
          <button data-range="open">Cordes à vide</button>
          <button data-range="first" class="active">1re position</button>
          <button data-range="full">Complète</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card stage">
    <div class="scoreline">
      <div class="stat"><div class="num" id="statScore">0</div><div class="cap">Réussies</div></div>
      <div class="stat"><div class="num" id="statTotal">0</div><div class="cap">Total</div></div>
      <div class="stat"><div class="num" id="statStreak">0</div><div class="cap">Série</div></div>
    </div>

    <button class="play-btn" id="playBtn" aria-label="Jouer">▶</button>
    <button class="replay hidden" id="replayBtn">↻ Réécouter</button>

    <div class="prompt" id="prompt">Clique sur ▶ pour entendre une note</div>

    <div id="scaleControls" class="hidden">
      <div class="seg" id="scaleTypeSeg">
        <button data-stype="major" class="active">Majeur</button>
        <button data-stype="minor">Mineur</button>
      </div>
      <div class="tonic-grid" id="tonicGrid"></div>
    </div>

    <div id="fingerboardWrap" class="hidden">
      <div class="fingerboard" id="fingerboard"></div>
      <label class="fb-help"><input type="checkbox" id="showNames"> Afficher les noms des notes</label>
    </div>

    <div class="choices" id="choices"></div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn hidden" id="nextBtn">Note suivante →</button>
  </div>

  <footer>Son synthétisé · fonctionne hors-ligne · 🎧 casque recommandé</footer>
  <div class="credit">Portrait de Niccolò Paganini (lithographie, XIXᵉ s.) — domaine public</div>
</div>

<script>
"use strict";

// ---------- Théorie musicale ----------
const NOTE_NAMES = ["Do","Do♯","Ré","Ré♯","Mi","Fa","Fa♯","Sol","Sol♯","La","La♯","Si"];
const INTERVALS = [
  {semi:0,  name:"Unisson"},
  {semi:1,  name:"2de min"},
  {semi:2,  name:"2de Maj"},
  {semi:3,  name:"3ce min"},
  {semi:4,  name:"3ce Maj"},
  {semi:5,  name:"4te juste"},
  {semi:6,  name:"Triton"},
  {semi:7,  name:"5te juste"},
  {semi:8,  name:"6te min"},
  {semi:9,  name:"6te Maj"},
  {semi:10, name:"7e min"},
  {semi:11, name:"7e Maj"},
  {semi:12, name:"Octave"},
];

// Plages en MIDI (C-1 = 0, A4 = 69)
const RANGES = {
  open:  [55, 62, 69, 76],                 // Sol3, Ré4, La4, Mi5 (cordes à vide)
  first: range(55, 83),                    // Sol3 → Si5 (1re position)
  full:  range(55, 105),                   // Sol3 → La7 (tessiture violon)
};
function range(a, b){ const r=[]; for(let i=a;i<=b;i++) r.push(i); return r; }
function midiToFreq(m){ return 440 * Math.pow(2, (m - 69) / 12); }
function pitchClass(m){ return ((m % 12) + 12) % 12; }
function noteName(m){ return NOTE_NAMES[pitchClass(m)]; }

// ---------- Synthèse du violon (Web Audio) ----------
let actx = null;
function audio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }

function playNote(freq, duration = 1.4){
  const ctx = audio();
  const t0 = ctx.currentTime;
  const master = ctx.createGain();
  master.connect(ctx.destination);

  // Enveloppe d'archet : attaque douce, soutien, relâche
  const peak = 0.22;
  master.gain.setValueAtTime(0.0001, t0);
  master.gain.exponentialRampToValueAtTime(peak, t0 + 0.09);
  master.gain.setValueAtTime(peak, t0 + duration - 0.25);
  master.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);

  // Filtre passe-bas pour adoucir le timbre (sawtooth = riche en harmoniques)
  const filter = ctx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(Math.min(freq * 6, 8000), t0);
  filter.Q.value = 0.7;
  filter.connect(master);

  // Léger formant pour la couleur "violon"
  const formant = ctx.createBiquadFilter();
  formant.type = "peaking";
  formant.frequency.value = 1400;
  formant.gain.value = 6;
  formant.Q.value = 1.2;
  formant.connect(filter);

  // Vibrato (LFO sur la fréquence)
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = 5.4;
  lfoGain.gain.setValueAtTime(0, t0);
  lfoGain.gain.linearRampToValueAtTime(freq * 0.012, t0 + 0.4); // vibrato qui s'installe
  lfo.connect(lfoGain);
  lfo.start(t0); lfo.stop(t0 + duration);

  // Deux oscillateurs légèrement désaccordés pour l'épaisseur
  [{type:"sawtooth", detune:0, g:0.6}, {type:"sawtooth", detune:-4, g:0.4}].forEach(o => {
    const osc = ctx.createOscillator();
    osc.type = o.type;
    osc.frequency.value = freq;
    osc.detune.value = o.detune;
    const g = ctx.createGain();
    g.gain.value = o.g;
    lfoGain.connect(osc.frequency);
    osc.connect(g); g.connect(formant);
    osc.start(t0); osc.stop(t0 + duration);
  });
}

async function playSequence(freqs, gap = 0.9, noteDur = 1.4){
  await audio().resume();
  freqs.forEach((f, i) => setTimeout(() => playNote(f, noteDur), i * gap * 1000));
}

// ---------- État du jeu ----------
const state = {
  mode: "fingerboard",
  range: "first",
  current: null,
  score: 0, total: 0, streak: 0,
  answered: false,
  showNames: false,
  scaleTonic: 7,      // 7 = Sol
  scaleType: "major",
  scaleNotes: [],
};

const el = {
  modeSeg: document.getElementById("modeSeg"),
  rangeSeg: document.getElementById("rangeSeg"),
  playBtn: document.getElementById("playBtn"),
  replayBtn: document.getElementById("replayBtn"),
  prompt: document.getElementById("prompt"),
  choices: document.getElementById("choices"),
  fingerboardWrap: document.getElementById("fingerboardWrap"),
  fingerboard: document.getElementById("fingerboard"),
  showNames: document.getElementById("showNames"),
  fbHelp: document.querySelector(".fb-help"),
  scaleControls: document.getElementById("scaleControls"),
  scaleTypeSeg: document.getElementById("scaleTypeSeg"),
  tonicGrid: document.getElementById("tonicGrid"),
  scoreline: document.querySelector(".scoreline"),
  rangeSetting: document.getElementById("rangeSetting"),
  feedback: document.getElementById("feedback"),
  nextBtn: document.getElementById("nextBtn"),
  statScore: document.getElementById("statScore"),
  statTotal: document.getElementById("statTotal"),
  statStreak: document.getElementById("statStreak"),
};

// Cordes du violon (1re position) : Sol3, Ré4, La4, Mi5
const STRINGS = [
  {open:55, name:"Sol", x:16, w:3.4},
  {open:62, name:"Ré",  x:39, w:2.7},
  {open:69, name:"La",  x:62, w:2.1},
  {open:76, name:"Mi",  x:85, w:1.5},
];
const FRETS = 7; // de la corde à vide jusqu'à la quinte (atteint la corde voisine)
const OPEN_MIDIS = STRINGS.map(s => s.open);
const FB_MIDIS = range(55, 83); // toutes les notes jouables en 1re position

// Gammes (demi-tons depuis la tonique, sur une octave)
const MAJOR = [0, 2, 4, 5, 7, 9, 11, 12];
const MINOR = [0, 2, 3, 5, 7, 8, 10, 12]; // mineur naturel
// Tonique la plus grave jouable en 1re position pour une classe de hauteur donnée
function scaleTonicMidi(pc){ for(let m = 55; m <= 66; m++) if(pitchClass(m) === pc) return m; return 55; }

function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

// ---------- Manche du violon ----------
function showAnswerArea(which){
  const scales = which === "scales";
  el.choices.classList.toggle("hidden", which !== "cards");
  el.fingerboardWrap.classList.toggle("hidden", which !== "fingerboard" && !scales);
  el.scaleControls.classList.toggle("hidden", !scales);
  // En mode Gammes : pas de score, pas d'étendue, pas de case "afficher les noms"
  el.scoreline.classList.toggle("hidden", scales);
  el.rangeSetting.classList.toggle("hidden", scales);
  el.fbHelp.classList.toggle("hidden", scales);
}

function renderFingerboard(){
  const fb = el.fingerboard;
  fb.innerHTML = "";
  const openOnly = state.range === "open";

  const nut = document.createElement("div");
  nut.className = "fb-nut";
  fb.appendChild(nut);

  STRINGS.forEach(s => {
    const line = document.createElement("div");
    line.className = "fb-string";
    line.style.left = s.x + "%";
    line.style.width = s.w + "px";
    fb.appendChild(line);

    const label = document.createElement("div");
    label.className = "fb-label";
    label.style.left = s.x + "%";
    label.textContent = s.name;
    fb.appendChild(label);

    for(let off = 0; off <= FRETS; off++){
      const midi = s.open + off;
      const dot = document.createElement("button");
      dot.className = "fb-dot" + (off === 0 ? " open" : "") + (state.showNames ? " show-name" : "");
      dot.style.left = s.x + "%";
      dot.style.top = (8 + off * (84 / FRETS)) + "%";
      dot.dataset.midi = midi;
      dot.textContent = noteName(midi);
      if(openOnly && off > 0) dot.disabled = true;
      dot.addEventListener("click", () => answerFingerboard(midi, dot));
      fb.appendChild(dot);
    }
  });
}

function answerFingerboard(midi, dot){
  if(!state.current || state.answered) return;
  state.answered = true;
  const target = state.current.target;
  const correct = midi === target;
  state.total++;
  if(correct){ state.score++; state.streak++; } else { state.streak = 0; }

  el.fingerboard.querySelectorAll(".fb-dot").forEach(d => {
    d.disabled = true;
    if(Number(d.dataset.midi) === target){
      d.classList.add(d === dot && correct ? "correct" : "reveal", "show-name");
    }
  });
  if(!correct) dot.classList.add("wrong", "show-name");

  el.feedback.textContent = correct ? "✓ Bravo !" : "✗ C'était : " + noteName(target);
  el.feedback.className = "feedback " + (correct ? "good" : "bad");
  updateStats();
  el.nextBtn.classList.remove("hidden");
}

// ---------- Mode Gammes ----------
function buildTonicGrid(){
  el.tonicGrid.innerHTML = "";
  NOTE_NAMES.forEach((name, pc) => {
    const b = document.createElement("button");
    b.className = "tonic" + (pc === state.scaleTonic ? " active" : "");
    b.textContent = name;
    b.dataset.pc = pc;
    b.addEventListener("click", () => {
      state.scaleTonic = pc;
      el.tonicGrid.querySelectorAll(".tonic").forEach(t =>
        t.classList.toggle("active", Number(t.dataset.pc) === pc));
      showScale();
      playScale();
    });
    el.tonicGrid.appendChild(b);
  });
}

function showScale(){
  const tonicMidi = scaleTonicMidi(state.scaleTonic);
  const pattern = state.scaleType === "major" ? MAJOR : MINOR;
  const notes = pattern.map(iv => tonicMidi + iv);
  state.scaleNotes = notes;

  renderFingerboard();           // construit le manche (pastilles)
  const set = new Set(notes);
  el.fingerboard.querySelectorAll(".fb-dot").forEach(d => {
    const m = Number(d.dataset.midi);
    d.disabled = true;
    if(set.has(m)){
      d.classList.add("scale-note", "show-name");
      if(pitchClass(m) === state.scaleTonic) d.classList.add("scale-root");
    } else {
      d.classList.add("scale-dim");
    }
  });

  const typeLabel = state.scaleType === "major" ? "majeur" : "mineur";
  el.prompt.textContent = "Gamme de " + NOTE_NAMES[state.scaleTonic] + " " + typeLabel + " — clique ▶ pour l'écouter";
}

function flashScaleDot(midi){
  el.fingerboard.querySelectorAll(".fb-dot.scale-note").forEach(d => {
    if(Number(d.dataset.midi) === midi){
      d.classList.add("playing");
      setTimeout(() => d.classList.remove("playing"), 340);
    }
  });
}

function playScale(){
  if(!state.scaleNotes.length) showScale();
  const notes = state.scaleNotes;
  const seq = notes.concat(notes.slice(0, -1).reverse()); // montante puis descendante
  const gap = 0.6;       // intervalle entre deux attaques
  const noteDur = 0.55;  // < gap : chaque note s'éteint avant la suivante (pas de chevauchement)
  playSequence(seq.map(midiToFreq), gap, noteDur);
  el.playBtn.classList.add("playing");
  seq.forEach((m, i) => setTimeout(() => flashScaleDot(m), i * gap * 1000));
  setTimeout(() => el.playBtn.classList.remove("playing"), seq.length * gap * 1000);
}

function newRound(){
  state.answered = false;
  el.feedback.textContent = "";
  el.feedback.className = "feedback";
  el.nextBtn.classList.add("hidden");
  el.replayBtn.classList.remove("hidden");

  const pool = RANGES[state.range];

  if(state.mode === "fingerboard"){
    showAnswerArea("fingerboard");
    const target = pick(state.range === "open" ? OPEN_MIDIS : FB_MIDIS);
    state.current = { notes: [target], target: target };
    el.prompt.textContent = "Où se trouve cette note sur le manche ?";
    renderFingerboard();
    playSequence([midiToFreq(target)]);
  } else if(state.mode === "absolute"){
    showAnswerArea("cards");
    const note = pick(pool);
    state.current = { notes: [note], answer: pitchClass(note) };
    el.prompt.textContent = "Quelle est cette note ?";
    buildNoteChoices();
    playSequence(state.current.notes.map(midiToFreq));
  } else {
    showAnswerArea("cards");
    const ref = pick(pool);
    const interval = pick(INTERVALS);
    const dir = Math.random() < 0.5 ? 1 : -1;
    let target = ref + dir * interval.semi;
    if(target < 50) target = ref + interval.semi;
    if(target > 108) target = ref - interval.semi;
    state.current = { notes: [ref, target], answer: interval.semi };
    el.prompt.textContent = "Quel intervalle sépare les deux notes ?";
    buildIntervalChoices();
    playSequence(state.current.notes.map(midiToFreq));
  }
}

function buildNoteChoices(){
  el.choices.className = "choices";
  el.choices.innerHTML = "";
  NOTE_NAMES.forEach((name, pc) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = name;
    b.dataset.value = pc;
    b.addEventListener("click", () => answer(pc, b));
    el.choices.appendChild(b);
  });
}

function buildIntervalChoices(){
  el.choices.className = "choices intervals";
  el.choices.innerHTML = "";
  INTERVALS.forEach(iv => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = iv.name;
    b.dataset.value = iv.semi;
    b.addEventListener("click", () => answer(iv.semi, b));
    el.choices.appendChild(b);
  });
}

function answer(value, btn){
  if(state.answered) return;
  state.answered = true;
  const correct = value === state.current.answer;
  state.total++;
  if(correct){ state.score++; state.streak++; }
  else { state.streak = 0; }

  [...el.choices.children].forEach(b => {
    b.disabled = true;
    const v = Number(b.dataset.value);
    if(v === state.current.answer) b.classList.add(correct && v === value ? "correct" : "reveal");
  });
  if(!correct) btn.classList.add("wrong");

  if(correct){
    el.feedback.textContent = "✓ Bravo !";
    el.feedback.className = "feedback good";
  } else {
    const label = state.mode === "absolute"
      ? noteName(state.current.notes[0])
      : INTERVALS.find(i => i.semi === state.current.answer).name;
    el.feedback.textContent = "✗ C'était : " + label;
    el.feedback.className = "feedback bad";
  }
  updateStats();
  el.nextBtn.classList.remove("hidden");
}

function updateStats(){
  el.statScore.textContent = state.score;
  el.statTotal.textContent = state.total;
  el.statStreak.textContent = state.streak;
}

// ---------- Évènements ----------
el.playBtn.addEventListener("click", () => {
  if(state.mode === "scales"){ playScale(); return; }
  if(!state.current || state.answered) newRound();
  else playSequence(state.current.notes.map(midiToFreq));
});
el.replayBtn.addEventListener("click", () => {
  if(state.current) playSequence(state.current.notes.map(midiToFreq));
});
el.nextBtn.addEventListener("click", newRound);

el.modeSeg.addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  [...el.modeSeg.children].forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.mode = btn.dataset.mode;
  resetForNewSettings();
});
el.rangeSeg.addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  [...el.rangeSeg.children].forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.range = btn.dataset.range;
  resetForNewSettings();
});

function resetForNewSettings(){
  state.current = null;
  state.answered = false;
  el.feedback.textContent = "";
  el.feedback.className = "feedback";
  el.nextBtn.classList.add("hidden");
  el.replayBtn.classList.add("hidden");
  if(state.mode === "scales"){
    showAnswerArea("scales");
    buildTonicGrid();
    showScale();
  } else if(state.mode === "fingerboard"){
    showAnswerArea("fingerboard");
    renderFingerboard();
    el.prompt.textContent = "Clique sur ▶ pour entendre une note à situer sur le manche";
  } else {
    showAnswerArea("cards");
    el.choices.innerHTML = "";
    el.prompt.textContent = "Clique sur ▶ pour entendre " + (state.mode === "absolute" ? "une note" : "l'intervalle");
  }
}

el.scaleTypeSeg.addEventListener("click", e => {
  const btn = e.target.closest("button"); if(!btn) return;
  [...el.scaleTypeSeg.children].forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.scaleType = btn.dataset.stype;
  showScale();
  playScale();
});

el.showNames.addEventListener("change", () => {
  state.showNames = el.showNames.checked;
  el.fingerboard.querySelectorAll(".fb-dot").forEach(d => d.classList.toggle("show-name", state.showNames));
});

updateStats();
resetForNewSettings();
</script>
</body>
</html>
